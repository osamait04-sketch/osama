<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صيدلية محمد غسان الحديدي - المزامنة العالمية</title>
    <style>
        :root { --primary: #2c7a7b; --secondary: #319795; --bg: #f7fafc; --text: #2d3748; }
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 20px; 
            position: relative;
            min-height: 100vh;
        }
        /* تعديل العلامة المائية لتصبح واضحة ومرئية خلف الواجهة */
        .watermark {
            position: fixed;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85vw;
            max-width: 500px;
            height: auto;
            opacity: 0.15;
            pointer-events: none; 
            z-index: 0;
        }
        .container { 
            max-width: 1000px; 
            margin: 20px auto; 
            background: rgba(255, 255, 255, 0.88);
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            position: relative;
            z-index: 1;
        }
        .header { display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; border-bottom: 3px solid var(--secondary); padding-bottom: 20px; }
        .logo-container { width: 140px; height: 140px; margin-bottom: 15px; }
        h1 { 
            color: var(--primary); 
            margin: 0; 
            font-size: 36px; 
            font-weight: 900; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }
        .form-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; color: #4a5568; }
        input, select { width: 100%; padding: 11px; border: 1px solid #cbd5e0; border-radius: 6px; box-sizing: border-box; font-size: 16px; background: white; }
        input:disabled, select:disabled { background-color: #edf2f7; color: #718096; cursor: not-allowed; }
        .btn-submit { background-color: var(--primary); color: white; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; text-align: center; margin-top: 10px; }
        th, td { padding: 12px; border: 1px solid #e2e8f0; }
        th { background-color: var(--primary); color: white; }
        tr:nth-child(even) { background-color: rgba(248, 250, 252, 0.7); }
        .btn-action { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; margin: 2px; }
        .btn-edit { background-color: #dd6b20; }
        .btn-delete { background-color: #e53e3e; }
        .status-bar { text-align: center; padding: 10px; background: #edf2f7; border-radius: 6px; margin-bottom: 15px; font-size: 15px; font-weight: bold; color: var(--primary); transition: all 0.3s ease; }
    </style>
</head>
<body>

<!-- شعار العلامة المائية المطور خلف النصوص والجدول -->
<svg class="watermark" viewBox="0 0 100 100">
    <path d="M30 30 C30 35, 35 43, 46 45 L46 72 L38 72 C35 72, 35 74, 38 74 L62 74 C65 74, 65 72, 62 72 L54 72 L54 45 C65 43, 70 35, 70 30 Z" fill="#2c7a7b"/>
    <path d="M30 30 L70 30 C70 28, 30 28, 30 30 Z" fill="#2c7a7b"/>
    <path d="M42 28 C30 25, 45 12, 58 15 C68 18, 65 25, 54 28 C45 30, 40 35, 51 38 C65 40, 60 48, 51 51 C40 54, 45 61, 52 64 C60 67, 46 71, 48 72" fill="none" stroke="#2c7a7b" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M42 28 L40 29 L41 27 Z" fill="#2c7a7b"/>
</svg>

<div class="container">
    <div class="header">
        <div class="logo-container">
            <svg viewBox="0 0 100 100" width="100%" height="100%">
                <path d="M30 30 C30 35, 35 43, 46 45 L46 72 L38 72 C35 72, 35 74, 38 74 L62 74 C65 74, 65 72, 62 72 L54 72 L54 45 C65 43, 70 35, 70 30 Z" fill="#00a8e8"/>
                <path d="M30 30 L70 30 C70 28, 30 28, 30 30 Z" fill="#00a8e8"/>
                <path d="M42 28 C30 25, 45 12, 58 15 C68 18, 65 25, 54 28 C45 30, 40 35, 51 38 C65 40, 60 48, 51 51 C40 54, 45 61, 52 64 C60 67, 46 71, 48 72" fill="none" stroke="#3a3a3a" stroke-width="4.5" stroke-linecap="round"/>
                <path d="M42 28 L40 29 L41 27 Z" fill="#3a3a3a"/>
                <path d="M40 29 C37 29, 36 31, 34 30" fill="none" stroke="#3a3a3a" stroke-width="1"/>
            </svg>
        </div>
        <h1>صيدلية محمد غسان الحديدي</h1>
    </div>

    <div class="status-bar" id="statusBar">جاري الاتصال بالشبكة العالمية... 🔄</div>
    
    <form id="medicineForm">
        <input type="hidden" id="editIndex" value="-1">
        <div class="form-group">
            <div>
                <label>اسم العلاج</label>
                <input type="text" id="medName" list="medicinesList" placeholder="اكتب أو اختر العلاج..." required autocomplete="off">
                <datalist id="medicinesList"></datalist>
            </div>
            <div>
                <label>النوع (الكتكوري)</label>
                <select id="medUnit">
                    <option value="صندوق">صندوق</option>
                    <option value="شريط">شريط</option>
                    <option value="كبسولة/حبة">كبسولة/حبة</option>
                    <option value="علبة شراب">علبة شراب</option>
                    <option value="فيال/أمبول">فيال/أمبول</option>
                    <option value="مرهم/كريم">مرهم/كريم</option>
                    <option value="بخاخ">بخاخ</option>
                </select>
            </div>
            <div>
                <label>الكمية الكلية</label>
                <input type="number" id="totalQty" min="0" placeholder="مثال: 100" required>
            </div>
            <div>
                <label>الكمية المسحوبة الحالية</label>
                <input type="number" id="withdrawnQty" min="0" placeholder="0" required>
            </div>
        </div>
        <button type="submit" class="btn-submit" id="submitBtn">تأكيد العملية (إضافة / سحب)</button>
    </form>

    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th>اسم العلاج</th>
                    <th>النوع</th>
                    <th>الكمية الكلية</th>
                    <th>مجموع المسحوب</th>
                    <th>المتبقي في المخزن</th>
                    <th>إجراءات التحكم</th>
                </tr>
            </thead>
            <tbody id="medicineTableBody"></tbody>
        </table>
    </div>
</div>

<script>
    const DB_URL = 'https://api.jsonbin.io/v3/b/66786638ad19ca34f87cf7a9';
    const MASTER_KEY = '$2a$10$W23M2vF9UoXNfNfev9p8vOzeqO.mX1N5Yp8.G2S8F3M5Fm3kK8Kqy';

    let medicines = JSON.parse(localStorage.getItem('pharmacy_inventory')) || [];

    const medicineForm = document.getElementById('medicineForm');
    const medicineTableBody = document.getElementById('medicineTableBody');
    const submitBtn = document.getElementById('submitBtn');
    const editIndexInput = document.getElementById('editIndex');
    const medNameInput = document.getElementById('medName');
    const medUnitSelect = document.getElementById('medUnit');
    const totalQtyInput = document.getElementById('totalQty');
    const medicinesList = document.getElementById('medicinesList');
    const statusBar = document.getElementById('statusBar');

    function renderTable(shouldSync = true) {
        medicineTableBody.innerHTML = '';
        medicines.forEach((med, index) => {
            const unit = med.unit || 'صندوق';
            const remaining = med.total - med.withdrawn;
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><strong>${med.name}</strong></td>
                <td style="color:#718096; font-size: 14px;">${unit}</td>
                <td style="color:#2c7a7b; font-weight:bold;">${med.total}</td>
                <td style="color:#dd6b20; font-weight:bold;">${med.withdrawn}</td>
                <td style="color: ${remaining <= 10 ? '#e53e3e' : '#2d3748'}; font-weight: bold;">${remaining}</td>
                <td>
                    <button class="btn-action btn-edit" onclick="editMedicine(${index})">تعديل كامل</button>
                    <button class="btn-action btn-delete" onclick="deleteMedicine(${index})">حذف</button>
                </td>
            `;
            medicineTableBody.appendChild(row);
        });
        updateDatalist();
        if(shouldSync) syncData();
    }

    async function loadData() {
        try {
            const res = await fetch(DB_URL, { headers: { 'X-Master-Key': MASTER_KEY } });
            if(res.ok) {
                const cloudData = await res.json();
                if(cloudData && cloudData.record) {
                    medicines = cloudData.record;
                    localStorage.setItem('pharmacy_inventory', JSON.stringify(medicines));
                    renderTable(false);
                    statusBar.innerText = "متصل بالشبكة العالمية أونلاين - البيانات متزامنة ولحظية تماماً بين الأجهزة ✅";
                    statusBar.style.background = "#c6f6d5";
                    statusBar.style.color = "#22543d";
                    return;
                }
            }
        } catch (e) { console.log("خطأ شبكة"); }
        statusBar.innerText = "يعمل بالوضع المستقر (مزامنة محلية متوفرة) 🔄";
        statusBar.style.background = "#edf2f7";
        statusBar.style.color = "#2c7a7b";
    }

    async function syncData() {
        localStorage.setItem('pharmacy_inventory', JSON.stringify(medicines));
        try {
            await fetch(DB_URL, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY },
                body: JSON.stringify(medicines)
            });
        } catch (e) { console.log("تعذر الرفع"); }
    }

    function updateDatalist() {
        medicinesList.innerHTML = '';
        medicines.forEach(med => {
            const option = document.createElement('option');
            option.value = med.name;
            medicinesList.appendChild(option);
        });
    }

    medNameInput.addEventListener('input', function() {
        const name = this.value.trim().toLowerCase();
        const existingMed = medicines.find(m => m.name.toLowerCase() === name);
        if (existingMed && editIndexInput.value === "-1") {
            totalQtyInput.value = existingMed.total;
            medUnitSelect.value = existingMed.unit || 'صندوق';
            totalQtyInput.disabled = true;
            medUnitSelect.disabled = true;
        } else if (editIndexInput.value === "-1") {
            totalQtyInput.disabled = false;
            medUnitSelect.disabled = false;
        }
    });

    medicineForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const name = medNameInput.value.trim();
        const unit = medUnitSelect.value;
        const total = parseInt(totalQtyInput.value);
        const withdrawn = parseInt(document.getElementById('withdrawnQty').value);
        const editIndex = parseInt(editIndexInput.value);

        if (editIndex > -1) {
            if(withdrawn > total) { alert('خطأ: المسحوب أكبر من الكلي!'); return; }
            medicines[editIndex] = { name, unit, total, withdrawn };
            submitBtn.innerText = "تأكيد العملية (إضافة / سحب)";
            editIndexInput.value = "-1";
            totalQtyInput.disabled = false;
            medUnitSelect.disabled = false;
        } else {
            const existingIndex = medicines.findIndex(m => m.name.toLowerCase() === name.toLowerCase());
            if (existingIndex > -1) {
                const newWithdrawnSum = medicines[existingIndex].withdrawn + withdrawn;
                if (newWithdrawnSum > medicines[existingIndex].total) {
                    alert(`خطأ: مجموع السحوبات الحالي (${newWithdrawnSum}) يتجاوز الكمية الكلية (${medicines[existingIndex].total})!`);
                    return;
                }
                medicines[existingIndex].withdrawn = newWithdrawnSum;
            } else {
                if(withdrawn > total) { alert('خطأ: المسحوب أكبر من الكلي!'); return; }
                medicines.push({ name, unit, total, withdrawn });
            }
        }
        totalQtyInput.disabled = false;
        medUnitSelect.disabled = false;
        medicineForm.reset();
        renderTable(true);
    });

    window.editMedicine = function(index) {
        const med = medicines[index];
        medNameInput.value = med.name;
        medUnitSelect.value = med.unit || 'صندوق';
        totalQtyInput.value = med.total;
        document.getElementById('withdrawnQty').value = med.withdrawn;
        totalQtyInput.disabled = false; 
        medUnitSelect.disabled = false;
        editIndexInput.value = index;
        submitBtn.innerText = `حفظ تعديلات: ${med.name}`;
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    window.deleteMedicine = function(index) {
        if(confirm('هل تريد الحذف؟')) {
            medicines.splice(index, 1);
            renderTable(true);
            if(parseInt(editIndexInput.value) === index){
                totalQtyInput.disabled = false;
                medUnitSelect.disabled = false;
                medicineForm.reset();
                submitBtn.innerText = "تأكيد العملية (إضافة / سحب)";
                editIndexInput.value = "-1";
            }
        }
    }

    renderTable(false);
    loadData();
    setInterval(loadData, 3000);
</script>

</body>
</html>
